# MD Simulation Configuration

simulation:
  forcefield: amber14sb
  ensemble: npt
  temperature: 300.0
  pressure: 1.0
  timestep: 0.002
  cutoff: 12.0

equilibration:
  steps: 100000

production:
  duration_ns: 500.0

analysis:
  rmsd: true
  rmsf: true
  radius_of_gyration: true
  hydrogen_bonds: true
